services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: aiwriter
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aiwriter_dev}
      POSTGRES_DB: aiwriter
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiwriter"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql+asyncpg://aiwriter:${DB_PASSWORD:-aiwriter_dev}@postgres/aiwriter
      REDIS_URL: redis://redis:6379
      AUTH_TOKEN: ${AUTH_TOKEN:-dev-token-change-me}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
    volumes:
      - ./backend:/app
      - ./storage:/app/storage

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on:
      backend: { condition: service_started }
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://backend:8000

  celery-worker:
    build: ./backend
    command: celery -A app.jobs.celery_app worker -l info -c 4 -Q default,writing,audit
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql+asyncpg://aiwriter:${DB_PASSWORD:-aiwriter_dev}@postgres/aiwriter
      REDIS_URL: redis://redis:6379
      AUTH_TOKEN: ${AUTH_TOKEN:-dev-token-change-me}

  celery-beat:
    build: ./backend
    command: celery -A app.jobs.celery_app beat -l info
    depends_on:
      redis: { condition: service_healthy }
    environment:
      REDIS_URL: redis://redis:6379

volumes:
  postgres-data:
